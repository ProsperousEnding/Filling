# 站点基础信息
# title / description 会参与页面标题、SEO 和部分界面文案
# title = "Filling"
# description = "一个基于 Vue 3 的静态博客框架示例站"

# 生产环境请替换成你的站点根域名，不要带仓库子路径
# 例如:
# - 自定义域名: "https://blog.example.com"
# - GitHub Pages 根域名: "https://your-name.github.io"
# GitHub Pages workflow 会在 CI 构建时自动覆盖成对应的 Pages URL
site_url = "https://example.com"

[header.leading_visual]
# 是否显示左上角视觉元素
visible = true

# 可选值:
# - "dots"  显示彩色圆点
# - "image" 显示自定义图片
type = "dots"

# 当 type = "image" 时启用以下字段
# 路径相对于 public/
# src = "icons/points.png"
# alt = "Header visual"
# width = 56
# height = 18

# 视觉元素旁边的标题文字
title = "Filling"

# 标题字号
# 可以写纯数字，也可以写 "18px" / "1rem"
title_size = "18"

[header.leading_visual.dots]
# 当 type = "dots" 时使用的圆点颜色
colors = ["#ff5f57", "#febc2e", "#28c840"]

[features]
# 侧边栏位置
# 可选值: "left" | "right" | "hidden"
sidebar_position = "right"

# 是否显示侧边栏
# sidebar_visible = true

# 分类和标签模块是否显示数量
# show_category_count = true
# show_tag_count = true

# 是否显示文章阅读时长
# show_read_time = true

# 是否在侧边栏显示个人资料卡片
show_profile_in_sidebar = true

[routing]
# 自定义站点路由
# 不配置时使用框架默认路由
# articles = "/articles"
# articles_page = "/articles/page/:page"
# article = "/article/:id"
# categories = "/category"
# category = "/category/:id"
# category_page = "/category/:id/page/:page"
# tags = "/tag"
# tag = "/tag/:id"
# tag_page = "/tag/:id/page/:page"
# archive = "/archive"
# archive_year = "/archive/:year"
# search = "/search"

[pagination]
# 分页大小
# page_size = 10

# 页面组件统一配置在 [[menus.pages]]
# 内置页面 key:
# - home
# - articles
# - categories
# - tags
# - archive
#
# component 可选值:
# - "context"  渲染单个 Markdown 文件，配 file
# - "list"     渲染目录内容列表，配 folder
# - "card"     渲染目录内容卡片，配 folder
# - "grid"     渲染目录内容网格，配 folder
# - "timeline" 渲染目录内容时间线，配 folder
#
# file / folder 都相对于 blog/content

# 首页
[[menus.pages]]
key = "home"
component = "list"

# 文章页
[[menus.pages]]
key = "articles"
component = "card"

# 分类页
[[menus.pages]]
key = "categories"
component = "grid"

# 标签页
[[menus.pages]]
key = "tags"
component = "list"

# 归档页
[[menus.pages]]
key = "archive"
component = "timeline"

# 自定义单页
# component = "context" 时使用 file
[[menus.pages]]
key = "about"
title = "关于"
component = "context"
file = "about.md"

# 自定义目录页
# component = "list" / "card" / "grid" / "timeline" 时使用 folder
# [[menus.pages]]
# key = "projects"
# title = "项目"
# component = "list"
# folder = "projects"

# 顶部菜单示例
# renderer 可选:
# - "header-pill"
# - "header-stack"
# source 可选:
# - "blog-nav"
# - "custom"
#
# [[menus.header]]
# renderer = "header-pill"
# source = "blog-nav"
# items = ["home", "articles", "categories", "tags", "archive", "about", "projects"]

# 移动端顶部菜单示例
# [[menus.mobile_header]]
# renderer = "header-stack"
# source = "blog-nav"
# items = ["home", "articles", "categories", "tags", "archive", "about", "projects"]

# 侧边栏菜单示例
# renderer 可选:
# - "sidebar-link"
# - "sidebar-article"
#
# source 可选:
# - "categories"
# - "tags"
# - "latest-articles"
# - "friend-links"
# - "custom"

# 分类模块
# [[menus.sidebar]]
# title = "分类"
# renderer = "sidebar-link"
# source = "categories"
# show_count = true

# 标签模块
# [[menus.sidebar]]
# title = "标签"
# renderer = "sidebar-link"
# source = "tags"
# variant = "tags"
# show_count = true

# 最新文章模块
# [[menus.sidebar]]
# title = "最新文章"
# renderer = "sidebar-article"
# source = "latest-articles"
# limit = 5

# 友情链接模块
# [[menus.sidebar]]
# title = "友情链接"
# renderer = "sidebar-link"
# source = "friend-links"

[footer]
# 页脚主文案
text = "版权所有 © Filling"

# 页脚备注
note = "基于 Vue3 + Pinia + Tailwind CSS 构建"

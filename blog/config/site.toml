# 站点基础信息
# title / description 会参与页面标题、SEO 和部分界面文案
# title = "Filling"
# description = "一个基于 Vue 3 的静态博客框架示例站"

# 生产环境请替换成你的站点根域名，不要带仓库子路径
# 例如:
# - 自定义域名: "https://blog.example.com"
# - GitHub Pages 根域名: "https://your-name.github.io"
# GitHub Pages workflow 会在 CI 构建时自动覆盖成对应的 Pages URL
site_url = "https://filling.initzo.com"

[header.leading_visual]
# 是否显示左上角视觉元素
visible = true

# 可选值:
# - "dots"  显示彩色圆点
# - "image" 显示自定义图片
type = "dots"

# 当 type = "image" 时启用以下字段
# 路径相对于 public/
# src = "icons/points.png"
# alt = "Header visual"
# width = 56
# height = 18

# 视觉元素旁边的标题文字
title = "Filling"

# 标题字号
# 可以写纯数字，也可以写 "18px" / "1rem"
title_size = "18"

[header.leading_visual.dots]
# 当 type = "dots" 时使用的圆点颜色
colors = ["#ff5f57", "#febc2e", "#28c840"]

[features]
# 侧边栏位置
# 可选值: "left" | "right" | "hidden"
sidebar_position = "right"

# 是否显示侧边栏
# sidebar_visible = true

# 分类和标签模块是否显示数量
# show_category_count = true
# show_tag_count = true

# 是否显示文章阅读时长
# show_read_time = true

# 是否显示文章过期提醒
# show_outdated_notice = false

# 距离上次更新超过多少天后提示
# outdated_threshold_days = 365

# 是否在侧边栏显示个人资料卡片
show_profile_in_sidebar = true

[sidebar]
# 侧边栏模块编排
# 可选 section:
# - "profile" 个人资料卡片
# - "search"  搜索框
# - "menu"    分类/标签/最新文章等菜单模块
desktop_sections = ["profile", "search", "menu"]

# 不配置时，文章页沿用对应的 desktop/mobile 默认顺序
# article_desktop_sections = ["profile", "menu"]
# mobile_sections = ["profile", "search", "menu"]
# article_mobile_sections = ["profile", "search", "menu"]

[routing]
# 自定义站点路由
# 不配置时使用框架默认路由
# articles = "/articles"
# articles_page = "/articles/page/:page"
# article = "/article/:id"
# categories = "/category"
# category = "/category/:id"
# category_page = "/category/:id/page/:page"
# tags = "/tag"
# tag = "/tag/:id"
# tag_page = "/tag/:id/page/:page"
# archive = "/archive"
# archive_year = "/archive/:year"
# search = "/search"

[pagination]
# 分页大小
# page_size = 10

# 页面组件统一配置在 [[menus.pages]]
# 内置页面 key:
# - home
# - articles
# - categories
# - tags
# - archive
#
# component 可选值:
# - "context"  渲染单个 Markdown 文件，配 file
# - "list"     渲染目录内容列表，配 folder
# - "card"     渲染目录内容卡片，配 folder
# - "grid"     渲染目录内容网格，配 folder
# - "timeline" 渲染目录内容时间线，配 folder
# - "friends"  渲染友情链接页面，读取 blog/config/links.toml
#
# file / folder 都相对于 blog/content

# 首页
[[menus.pages]]
key = "home"
component = "list"

# 文章页
[[menus.pages]]
key = "articles"
component = "card"

# 分类页
[[menus.pages]]
key = "categories"
component = "grid"

# 标签页
[[menus.pages]]
key = "tags"
component = "list"

# 归档页
[[menus.pages]]
key = "archive"
component = "timeline"

# 自定义单页
# component = "context" 时使用 file
[[menus.pages]]
key = "about"
title = "关于"
component = "context"
file = "about.md"

# 友情链接页
[[menus.pages]]
key = "friends"
title = "友链"
description = "一些会定期访问，也愿意推荐给别人的站点。"
component = "friends"
content = """
这里收录一些我常读、常逛或愿意推荐给别人的站点。

如果你希望交换友链，可以通过侧边栏社交链接联系我。
"""

[menus.pages.application]
title = "申请交换友链"
description = "如果你的站点长期更新、内容以原创为主，也欢迎来交换友链。"
requirements = [
  "站点可以稳定访问，尽量启用 HTTPS",
  "内容以原创或高质量整理为主，长期维护",
  "页面风格不限，但不要有大量影响阅读的广告或弹窗"
]
submission_fields = [
  "站点名称",
  "站点地址",
  "一句话简介",
  "头像或 Logo 地址",
  "RSS 地址（可选）"
]
template = """
站点名称：
站点地址：
站点简介：
头像地址：
RSS 地址：
"""
# contact_label = "通过 GitHub 联系我"
# contact_url = "https://github.com/ProsperousEnding"


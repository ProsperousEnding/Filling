[footer]
# 页脚主文案
text = "版权所有 © Filling"

# 页脚备注
note = "基于 Vue3 + Pinia + Tailwind CSS 构建"

# 页脚 HTML 片段
# 这里会按 HTML 原样注入，适合放备案链接、统计说明等可信内容
